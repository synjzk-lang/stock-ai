name: Stock AI

on:
  schedule:
    - cron: '30 1 * * *'   # 每天北京时间9:30自动运行
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: 安装Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install akshare pandas

      - name: 运行程序
        run: |
          python stock_ai.py
